<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>곤충카드 · 문의</title>
<style>
  :root {
    --bg: #f7f8fb;
    --surface: #ffffff;
    --text: #1a1a1a;
    --muted: #6b7280;
    --accent: #2196F3;
    --border: #e5e7eb;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
  }
  .container { max-width: 600px; margin: 0 auto; padding: 64px 24px 96px; }
  h1 { font-size: 2rem; margin: 0 0 8px; font-weight: 700; }
  .subtitle { color: var(--muted); font-size: 0.95rem; margin-bottom: 40px; }
  h2 { font-size: 1.2rem; margin: 32px 0 12px; font-weight: 700; }
  p, li { font-size: 0.95rem; }
  ul { padding-left: 22px; }
  li { margin: 6px 0; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }
  .contact-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
    margin: 16px 0;
  }
  .meta { font-size: 0.85rem; color: var(--muted); margin-top: 48px; }
</style>
</head>
<body>
<div class="container">

<h1>문의</h1>
<p class="subtitle">버그 신고 · 기능 제안 · 데이터 오류 신고</p>

<h2>이메일</h2>
<div class="contact-box">
  <p style="margin:0"><strong>이메일</strong>: <a href="mailto:soojeongmin19kor@gmail.com">soojeongmin19kor@gmail.com</a></p>
  <p style="margin:8px 0 0; color: var(--muted); font-size: 0.9rem;">평일 기준 7일 이내 답변 드립니다.</p>
</div>

<h2>문의 시 포함하면 좋은 정보</h2>
<ul>
  <li>앱 버전</li>
  <li>기기 모델 및 OS 버전 (iOS / Android)</li>
  <li>문제 상황의 스크린샷 또는 설명</li>
  <li>곤충 데이터 오류의 경우 해당 학명 또는 국명</li>
</ul>

<p class="meta">© 2026 민수정 · 곤충카드</p>

</div>
</body>
</html>
