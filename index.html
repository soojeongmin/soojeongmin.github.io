<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>민수정 · 별에서 바다로</title>
<style>
  :root { --fg:#ffffff; --muted:#aeb4c0; --accent:#0000ff; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { color:var(--fg); font-family:"Noto Sans KR","Inter",system-ui,sans-serif; background:#02030a; }
  #c { position:fixed; inset:0; z-index:0; display:block; }
  #vignette { position:fixed; inset:0; z-index:1; pointer-events:none;
    background:radial-gradient(125% 95% at 50% 42%, transparent 60%, rgba(0,0,0,.4) 100%); }

  .glass { position:relative; background:rgba(255,255,255,.035);
    backdrop-filter:blur(16px) saturate(180%); -webkit-backdrop-filter:blur(16px) saturate(180%);
    border:1px solid rgba(255,255,255,.09);
    box-shadow:0 6px 24px rgba(0,0,0,.22), inset 0 1px 0 rgba(255,255,255,.16); }
  .glass::before { content:""; position:absolute; inset:0; border-radius:inherit; pointer-events:none;
    background:radial-gradient(130% 80% at 14% 0%, rgba(255,255,255,.14), transparent 52%); mix-blend-mode:screen; }

  nav { position:fixed; top:0; right:0; z-index:5; padding:20px 6vw; }
  .ghbtn { padding:9px 16px; border-radius:999px; color:#fff; text-decoration:none; font-size:13px; pointer-events:auto; }

  .overlay { position:relative; z-index:2; pointer-events:none; }
  .s { min-height:100vh; display:flex; flex-direction:column; justify-content:center; padding:0 8vw; }
  .s.right { align-items:flex-end; text-align:right; }
  .s.center { align-items:center; text-align:center; }
  h1 { font-size:clamp(40px,7.5vw,110px); font-weight:900; letter-spacing:-.05em; line-height:.95; }
  h2 { font-size:clamp(30px,5.5vw,72px); font-weight:900; letter-spacing:-.04em; }
  .accent { color:var(--accent); }
  .sub { margin-top:22px; font-size:clamp(15px,1.8vw,22px); color:#dde3ee; letter-spacing:.01em; }
  p.body { margin-top:18px; max-width:46ch; font-size:clamp(15px,1.5vw,19px); line-height:1.85; color:#eef1f7;
    text-shadow:0 1px 18px rgba(0,0,0,.45); }

  /* DNA helix portfolio */
  .posts { position:relative; z-index:2; height:150vh; }
  .hstage { position:sticky; top:0; height:100vh; overflow:hidden; perspective:1400px; }
  .htitle { position:absolute; top:7vh; left:0; right:0; text-align:center; z-index:3; pointer-events:none; }
  .htitle h2 { font-size:clamp(26px,4vw,52px); }
  .htitle p { margin-top:8px; color:var(--muted); font-size:13px; letter-spacing:.04em; }
  .hcore { position:absolute; left:50%; top:0; width:80px; height:100%; transform:translateX(-50%); z-index:1; pointer-events:none;
    background:linear-gradient(180deg, transparent 4%, rgba(120,170,255,.24) 50%, transparent 96%); filter:blur(12px); }
  .hcore .sp { position:absolute; bottom:-12px; border-radius:50%; background:rgba(195,218,255,.95);
    box-shadow:0 0 7px rgba(150,190,255,.85); animation-name:rise; animation-timing-function:linear; animation-iteration-count:infinite; }
  @keyframes rise { 0%{transform:translateY(0) scale(.5); opacity:0} 12%{opacity:.95} 85%{opacity:.8} 100%{transform:translateY(-90vh) scale(1); opacity:0} }
  .helix { position:absolute; left:50%; top:50%; transform-style:preserve-3d; z-index:2; }
  .pcard { position:absolute; left:0; top:0; width:320px; margin:-100px 0 0 -160px; border-radius:18px;
    padding:22px 22px 24px; backface-visibility:visible; pointer-events:auto; text-decoration:none; color:inherit;
    background:rgba(16,26,48,.42); border:1px solid rgba(255,255,255,.14);
    backdrop-filter:blur(13px) saturate(160%); -webkit-backdrop-filter:blur(13px) saturate(160%);
    box-shadow:0 10px 34px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.2); }
  .pcard::before { content:""; position:absolute; inset:0; border-radius:inherit; pointer-events:none;
    background:radial-gradient(130% 80% at 16% 0%, rgba(255,255,255,.16), transparent 54%); mix-blend-mode:screen; }
  .pcard .pm { font-size:12px; letter-spacing:.13em; color:#9cc0ff; }
  .pcard .pt { margin-top:12px; font-size:19px; font-weight:700; letter-spacing:-.02em; color:#fff; }
  .pcard .pd { margin-top:9px; font-size:13px; line-height:1.6; color:#cdd4e0; }

  footer { position:relative; z-index:2; padding:40px 8vw; color:#eef2f8; font-size:13px; border-top:1px solid rgba(255,255,255,.12); }
  #totop { position:fixed; left:50%; bottom:30px; transform:translateX(-50%) translateY(8px); z-index:6;
    width:50px; height:50px; display:flex; align-items:center; justify-content:center; border-radius:50%;
    color:#dce6ff; font-size:15px; cursor:pointer; opacity:0; pointer-events:none; transition:opacity .4s, transform .4s; }
  #totop.show { opacity:1; pointer-events:auto; transform:translateX(-50%) translateY(0); }
  #totop:hover { color:#fff; }
</style>

<script type="module">
import * as THREE from 'three';

if('scrollRestoration' in history) history.scrollRestoration='manual';
window.scrollTo(0,0);
addEventListener('load',()=>window.scrollTo(0,0));

/* scroll speed limiter (wheel damp + smooth) */
let targetScroll=0, wheelIdle=999;
function maxScroll(){ return Math.max(0, document.documentElement.scrollHeight - innerHeight); }
addEventListener('wheel', e=>{ e.preventDefault(); targetScroll=Math.max(0, Math.min(maxScroll(), targetScroll + e.deltaY*0.5)); wheelIdle=0; }, {passive:false});
const totop=document.getElementById('totop');
totop.addEventListener('click',()=>{ targetScroll=0; window.scrollTo({top:0, behavior:'smooth'}); });

/* ===================== DNA helix portfolio (DOM 3D) ===================== */
const POSTS=[];
const helixEl=document.getElementById('helix');
const HR=300, HASTEP=55, VGAP=165;
const cardEls=[];
POSTS.forEach((po,idx)=>{
  const a=document.createElement('a'); a.className='pcard'; a.href='#';
  a.innerHTML=`<div class="pm">${po.m}</div><div class="pt">${po.t}</div><div class="pd">${po.d}</div>`;
  a._i=idx;
  helixEl.appendChild(a); cardEls.push(a);
});
let postsTop=0, postsLen=1, postsStart=1;
function measure(){ const el=document.querySelector('.posts'); postsTop=el.offsetTop; postsStart=Math.max(1,el.offsetTop); postsLen=Math.max(1, el.offsetHeight - innerHeight); }
measure(); addEventListener('resize', measure); addEventListener('load', measure);
function updateHelix(){
  const pp=Math.max(0, Math.min(1, (scrollY - postsTop)/postsLen));
  const current=pp*(POSTS.length-1);
  helixEl.style.transform='translate(-50%,-50%)';
  for(const el of cardEls){
    const ri=el._i-current, ang=ri*HASTEP, y=ri*VGAP, fr=Math.cos(ang*Math.PI/180);
    el.style.transform=`translateY(${y.toFixed(1)}px) rotateY(${ang.toFixed(1)}deg) translateZ(${HR}px)`;
    const df=Math.max(0,1-Math.abs(ri)*0.28);
    el.style.opacity = (df*(0.32+0.68*((fr+1)/2))).toFixed(2);
    el.style.zIndex = String(Math.round(200+fr*100));
    el.style.pointerEvents = Math.abs(ri)<0.5 ? 'auto':'none';
  }
}

/* ===================== WebGL scene ===================== */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true });
const DPR = Math.min(devicePixelRatio, 2);
renderer.setPixelRatio(DPR);
renderer.setSize(innerWidth, innerHeight);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x02030a);
scene.fog = new THREE.FogExp2(0x02030a, 0.001);
const camera = new THREE.PerspectiveCamera(68, innerWidth/innerHeight, 0.1, 2000);
camera.rotation.order = 'YXZ';

function smoothstep(a,b,x){ x=Math.max(0,Math.min(1,(x-a)/(b-a))); return x*x*(3-2*x); }
function seg(arr,p){ if(p<=arr[0][0])return[0,0]; for(let i=0;i<arr.length-1;i++){ if(p<=arr[i+1][0]){ return [i,(p-arr[i][0])/(arr[i+1][0]-arr[i][0])]; } } return [arr.length-2,1]; }
function numAt(arr,p){ const [i,f]=seg(arr,p); return arr[i][1]+(arr[i+1][1]-arr[i][1])*f; }
const _ca=new THREE.Color(),_cb=new THREE.Color();
function colAt(arr,p,out){ const [i,f]=seg(arr,p); _ca.setHex(arr[i][1]); _cb.setHex(arr[i+1][1]); out.copy(_ca).lerp(_cb,f); }

const SKY=[[0,0x02030a],[0.25,0x07112a],[0.50,0x163c70],[0.70,0x2f6cb4],[0.88,0x2056a0],[0.96,0x103a72],[1,0x07274f]];
const FOG=[[0,0.0010],[0.45,0.0016],[0.82,0.0034],[0.94,0.010],[1,0.020]];
const CAMX=[[0,0],[0.28,55],[0.55,-34],[0.82,12],[0.90,4],[1,0]];
const CAMY=[[0,300],[0.25,242],[0.50,175],[0.70,95],[0.82,42],[0.90,16],[0.96,-5],[1,-26]];
const CAMZ=[[0,42],[0.28,-6],[0.60,24],[0.85,6],[1,-10]];
const LOOKX=[[0,0],[0.28,-16],[0.60,14],[0.90,0],[1,0]];
const LOOKY=[[0,292],[0.25,208],[0.50,90],[0.72,0],[0.86,-16],[1,-22]];
const LOOKZ=[[0,-120],[0.28,-90],[0.60,-50],[0.90,-66],[1,-96]];
const ROLL=[[0,0],[0.28,0.18],[0.60,-0.15],[0.85,0.05],[1,0]];

/* stars */
const SC=new THREE.Vector3(0,300,42), N=1300, starPos=new Float32Array(N*3);
for(let i=0;i<N;i++){ const r=30+Math.random()*210,u=Math.random()*2-1,th=Math.random()*Math.PI*2,s=Math.sqrt(1-u*u);
  starPos[i*3]=SC.x+Math.cos(th)*s*r; starPos[i*3+1]=SC.y+u*r; starPos[i*3+2]=SC.z+Math.sin(th)*s*r; }
const starGeo=new THREE.BufferGeometry(); starGeo.setAttribute('position', new THREE.BufferAttribute(starPos,3));
const discTex=(()=>{ const s=64,cv=document.createElement('canvas'); cv.width=cv.height=s; const g=cv.getContext('2d');
  g.fillStyle='#fff'; g.beginPath(); g.arc(s/2,s/2,s/2-8,0,Math.PI*2); g.fill(); return new THREE.CanvasTexture(cv); })();
const starMat=new THREE.PointsMaterial({ map:discTex, color:0xffffff, size:0.85, sizeAttenuation:true, transparent:true, alphaTest:0.45, depthWrite:false, fog:true });
scene.add(new THREE.Points(starGeo, starMat));

/* constellation */
const MAXLE=64, lineGeo=new THREE.BufferGeometry();
const linePos=new Float32Array(MAXLE*2*3), lineCol=new Float32Array(MAXLE*2*3);
lineGeo.setAttribute('position', new THREE.BufferAttribute(linePos,3));
lineGeo.setAttribute('color', new THREE.BufferAttribute(lineCol,3));
lineGeo.setDrawRange(0,0);
scene.add(new THREE.LineSegments(lineGeo, new THREE.LineBasicMaterial({ vertexColors:true, transparent:true, depthWrite:false, fog:false, blending:THREE.AdditiveBlending })));
const edgeLife=new Map();

/* digital sea (white points) + splash */
const MAXR=8, ripVec=Array.from({length:MAXR},()=>new THREE.Vector4(0,0,99,0));
const NX=180,NZ=240,SW=360,SD=560, seaArr=new Float32Array(NX*NZ*3); let sk=0;
for(let iz=0;iz<NZ;iz++) for(let ix=0;ix<NX;ix++){ seaArr[sk++]=-SW/2+ix/(NX-1)*SW; seaArr[sk++]=0; seaArr[sk++]=-SD+iz/(NZ-1)*SD+40; }
const seaGeo=new THREE.BufferGeometry(); seaGeo.setAttribute('position', new THREE.BufferAttribute(seaArr,3));
const seaMat=new THREE.ShaderMaterial({ transparent:true, depthWrite:false, blending:THREE.AdditiveBlending,
  uniforms:{ uTime:{value:0}, uRipples:{value:ripVec}, uRippleCount:{value:0}, uPR:{value:DPR}, uOpacity:{value:0}, uSplash:{value:new THREE.Vector4(0,0,0,0)},
    uLow:{value:new THREE.Color(0x6a82b8)}, uHigh:{value:new THREE.Color(0xffffff)} },
  vertexShader:`
    uniform float uTime; uniform vec4 uRipples[${MAXR}]; uniform int uRippleCount; uniform float uPR; uniform vec4 uSplash;
    varying float vH; varying float vFog;
    float w(vec2 p){
      float y=0.0;
      y+=sin(dot(p,vec2(0.082,0.174))+uTime*0.50)*1.1;
      y+=sin(dot(p,vec2(-0.134,0.086))+uTime*0.42)*0.8;
      float wp=sin(p.x*0.05+uTime*0.30)*1.6;
      y+=sin((p.y+wp)*0.13+uTime*0.60)*0.55;
      y+=sin((p.x*0.71-p.y*0.33)*0.19+uTime*0.83)*0.35;
      y+=sin((p.x*0.27+p.y*0.61)*0.17-uTime*0.71)*0.30;
      y+=sin((p.x*0.90+p.y*0.20)*0.31+uTime*1.20)*0.16;
      return y;
    }
    void main(){
      vec2 p=vec2(position.x,position.z); float y=w(p);
      for(int i=0;i<${MAXR};i++){ if(i>=uRippleCount)break; vec4 r=uRipples[i]; float d=distance(p,r.xy);
        y+=sin(d*0.7-r.z*5.0)*exp(-d*0.10)*exp(-r.z*1.2)*r.w; }
      if(uSplash.w>0.0){ float ds=distance(p,uSplash.xy); float front=uSplash.z*34.0;
        y+=sin((ds-front)*0.42)*exp(-abs(ds-front)*0.04)*exp(-uSplash.z*0.4)*uSplash.w;
        y+=cos(uSplash.z*7.0)*exp(-ds*0.05)*exp(-uSplash.z*1.1)*uSplash.w*1.8; }
      vH=y; vec4 mv=modelViewMatrix*vec4(position.x,y,position.z,1.0); vFog=-mv.z;
      gl_PointSize=min(uPR*4.5, uPR*(150.0/ -mv.z)*(0.7+0.4*smoothstep(-1.5,2.0,y)));
      gl_Position=projectionMatrix*mv;
    }`,
  fragmentShader:`
    precision mediump float; varying float vH; varying float vFog;
    uniform vec3 uLow; uniform vec3 uHigh; uniform float uOpacity;
    void main(){ vec2 c=gl_PointCoord-0.5; float d=length(c); if(d>0.5)discard;
      float a=smoothstep(0.5,0.0,d); float t=smoothstep(-1.2,2.0,vH);
      vec3 col=mix(uLow,uHigh,t); float fog=1.0-smoothstep(220.0,520.0,vFog);
      gl_FragColor=vec4(col, a*(0.3+0.6*t)*fog*uOpacity); }`
});
scene.add(new THREE.Points(seaGeo, seaMat));

/* underwater motes (data) */
const softVert=`attribute float aA; attribute float aS; varying float vA;
  void main(){ vA=aA; vec4 mv=modelViewMatrix*vec4(position,1.0); gl_PointSize=aS*(300.0/ -mv.z); gl_Position=projectionMatrix*mv; }`;
const softFrag=`precision mediump float; uniform vec3 uColor; varying float vA;
  void main(){ vec2 c=gl_PointCoord-0.5; float d=length(c); if(d>0.5) discard; float a=smoothstep(0.5,0.0,d); gl_FragColor=vec4(uColor, a*vA); }`;
const DC=new THREE.Vector3(0,-26,-92);
const glowTexD=(()=>{ const s=128,cv=document.createElement('canvas'); cv.width=cv.height=s; const g=cv.getContext('2d');
  const gr=g.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2); gr.addColorStop(0,'rgba(120,180,255,0.55)'); gr.addColorStop(0.4,'rgba(50,110,255,0.16)'); gr.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle=gr; g.fillRect(0,0,s,s); return new THREE.CanvasTexture(cv); })();

/* data dust */
const DUST=1500;
const dPos=new Float32Array(DUST*3), dVel=new Float32Array(DUST*3), dA=new Float32Array(DUST), dS=new Float32Array(DUST);
for(let i=0;i<DUST;i++){ dPos[i*3]=DC.x+(Math.random()-0.5)*300; dPos[i*3+1]=DC.y+(Math.random()-0.5)*180; dPos[i*3+2]=DC.z+(Math.random()-0.5)*220; dS[i]=0.4+Math.random()*1.5; }
const dustGeo=new THREE.BufferGeometry();
dustGeo.setAttribute('position', new THREE.BufferAttribute(dPos,3));
dustGeo.setAttribute('aA', new THREE.BufferAttribute(dA,1));
dustGeo.setAttribute('aS', new THREE.BufferAttribute(dS,1));
const dustMat=new THREE.ShaderMaterial({ transparent:true, depthWrite:false, blending:THREE.AdditiveBlending, vertexShader:softVert, fragmentShader:softFrag, uniforms:{ uColor:{value:new THREE.Color(0xaad4ff)} } });
const dustPts=new THREE.Points(dustGeo, dustMat); dustPts.frustumCulled=false; scene.add(dustPts);

/* deep group: abstract core + floating HUD frames */
let pulseT=99; const pulseC=new THREE.Vector3(), cwd=new THREE.Vector3();

/* white paper plane — outline only */
const planeGeo=new THREE.BufferGeometry();
planeGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array([
  0,0,2.2,      // 0 nose
  0,0.14,-1.6,  // 1 tail center (ridge peak)
 -1.4,-0.1,-1.6, // 2 left tip
  1.4,-0.1,-1.6, // 3 right tip
  0,-0.7,-1.6   // 4 keel bottom (vertical fin back)
]),3));
planeGeo.setIndex([0,1,2, 0,3,1, 0,1,4]);
const planeMesh=new THREE.LineSegments(new THREE.EdgesGeometry(planeGeo, 1), new THREE.LineBasicMaterial({ color:0xffffff, transparent:true }));
planeMesh.visible=false; scene.add(planeMesh);
const fwd=new THREE.Vector3(), rgt=new THREE.Vector3(), upv=new THREE.Vector3(), ptgt=new THREE.Vector3(), pup=new THREE.Vector3();

/* input */
let mx=innerWidth/2, my=innerHeight/2;
const mt=new THREE.Vector2(0,0), m=new THREE.Vector2(0,0);
let scrollT=0;
const ray=new THREE.Raycaster(), ndc=new THREE.Vector2(), splane=new THREE.Plane(new THREE.Vector3(0,1,0),0), hp=new THREE.Vector3();
const ripples=[];
function seaPoint(cx,cy){ ndc.x=(cx/innerWidth)*2-1; ndc.y=-(cy/innerHeight)*2+1; ray.setFromCamera(ndc,camera); return ray.ray.intersectPlane(splane,hp)?hp.clone():null; }
function spawnR(x,z,s){ if(ripples.length>=MAXR) ripples.shift(); ripples.push({x,z,age:0,s}); }
addEventListener('pointermove', e=>{ mx=e.clientX; my=e.clientY; mt.x=(e.clientX/innerWidth)*2-1; mt.y=-(e.clientY/innerHeight)*2+1;
  if(scrollT>0.82 && scrollT<0.96){ const pt=seaPoint(e.clientX,e.clientY); if(pt) spawnR(pt.x,pt.z,0.8); } });
addEventListener('click', e=>{ if(scrollT>0.93 && !e.target.closest('a,button')){ ndc.x=(e.clientX/innerWidth)*2-1; ndc.y=-(e.clientY/innerHeight)*2+1; ray.setFromCamera(ndc,camera); pulseC.copy(ray.ray.origin).addScaledVector(ray.ray.direction, camera.position.distanceTo(DC)); pulseT=0; } });

const splash={fired:false,active:false,t:0};
function fire(){ splash.active=true; splash.t=0; splash.fired=true; spawnR(0,0,4); }

const v=new THREE.Vector3(), view=new THREE.Vector3(), near=[];
const R=180, L=150;
const clock=new THREE.Clock();

function frame(){
  const dt=Math.min(clock.getDelta(),0.05), t=clock.elapsedTime;
  wheelIdle++;
  if(wheelIdle<=45){ const cur=window.scrollY; window.scrollTo(0, cur+(targetScroll-cur)*0.09); } else { targetScroll=window.scrollY; }
  const target=Math.max(0, Math.min(1, scrollY/postsStart));
  scrollT += (target-scrollT)*0.05;
  m.x+=(mt.x-m.x)*0.05; m.y+=(mt.y-m.y)*0.05;
  const p=scrollT;

  colAt(SKY,p,scene.background); scene.fog.color.copy(scene.background); scene.fog.density=numAt(FOG,p);

  const spaceMix=1-smoothstep(0.18,0.46,p);
  camera.position.set(numAt(CAMX,p)+Math.sin(t*0.03)*3*spaceMix+m.x*4*spaceMix, numAt(CAMY,p)+Math.cos(t*0.025)*2*spaceMix, numAt(CAMZ,p));
  if(p>0.94){ const dp=Math.max(0,Math.min(1,(scrollY-postsTop)/postsLen)); camera.position.z -= dp*48; }
  camera.up.set(0,1,0);
  camera.lookAt(numAt(LOOKX,p)+(Math.sin(t*0.02)*80+m.x*120)*spaceMix, numAt(LOOKY,p)+(Math.sin(t*0.017)*18+m.y*70)*spaceMix, numAt(LOOKZ,p));
  camera.rotateZ(numAt(ROLL,p));
  camera.updateMatrixWorld();

  /* stars + constellation */
  const starFade=1-smoothstep(0.26,0.46,p);
  starMat.opacity=0.95*starFade;
  let e=0;
  if(starFade>0.03 && p<0.30){
    const W=innerWidth,H=innerHeight; near.length=0;
    for(let i=0;i<N;i++){
      v.set(starPos[i*3],starPos[i*3+1],starPos[i*3+2]);
      view.copy(v).applyMatrix4(camera.matrixWorldInverse); if(view.z>-3) continue;
      v.project(camera);
      const sx=(v.x*0.5+0.5)*W, sy=(-v.y*0.5+0.5)*H, dx=sx-mx, dy=sy-my;
      if(dx*dx+dy*dy<R*R) near.push(i,sx,sy);
    }
    const desired=new Set(); let focal=-1,fb=1e9,fsx=0,fsy=0;
    for(let a=0;a<near.length;a+=3){ const dx=near[a+1]-mx,dy=near[a+2]-my,d2=dx*dx+dy*dy; if(d2<fb){fb=d2;focal=near[a];fsx=near[a+1];fsy=near[a+2];} }
    if(focal>=0){ const cands=[];
      for(let a=0;a<near.length;a+=3){ if(near[a]===focal)continue; const dx=near[a+1]-fsx,dy=near[a+2]-fsy,d2=dx*dx+dy*dy; if(d2<L*L)cands.push([d2,near[a]]); }
      cands.sort((x,y2)=>x[0]-y2[0]);
      for(let c=0;c<Math.min(3,cands.length);c++){ const j=cands[c][1]; const key=(focal<j?focal:j)*100000+(focal<j?j:focal); desired.add(key); edgeLife.set(key, Math.min(1,(edgeLife.get(key)||0)+dt*5)); }
    }
    for(const key of edgeLife.keys()){ if(!desired.has(key)){ const nv=edgeLife.get(key)-dt*2.4; if(nv<=0)edgeLife.delete(key); else edgeLife.set(key,nv); } }
    for(const [key,life] of edgeLife){ if(e>=MAXLE)break; const i=Math.floor(key/100000), j=key%100000, o=e*6;
      linePos[o]=starPos[i*3];linePos[o+1]=starPos[i*3+1];linePos[o+2]=starPos[i*3+2];
      linePos[o+3]=starPos[j*3];linePos[o+4]=starPos[j*3+1];linePos[o+5]=starPos[j*3+2];
      const lf=life*starFade, cr=0.62*lf,cg=0.76*lf,cb=1.0*lf;
      lineCol[o]=cr;lineCol[o+1]=cg;lineCol[o+2]=cb; lineCol[o+3]=cr;lineCol[o+4]=cg;lineCol[o+5]=cb; e++; }
  } else edgeLife.clear();
  lineGeo.setDrawRange(0,e*2); lineGeo.attributes.position.needsUpdate=true; lineGeo.attributes.color.needsUpdate=true;

  /* paper plane */
  const skyVis=smoothstep(0.38,0.45,p)*(1-smoothstep(0.62,0.70,p));
  if(skyVis>0.01){
    planeMesh.visible=true;
    fwd.set(0,0,-1).applyQuaternion(camera.quaternion); rgt.set(1,0,0).applyQuaternion(camera.quaternion); upv.set(0,1,0).applyQuaternion(camera.quaternion);
    const cross=Math.max(0,Math.min(1,(p-0.38)/0.28));
    const arc=Math.sin(cross*Math.PI);
    const offX=130-cross*260, depth=120-arc*80, offY=40-cross*90+arc*6+Math.sin(t*0.8)*0.8;
    planeMesh.position.copy(camera.position).addScaledVector(fwd,depth).addScaledVector(rgt,offX).addScaledVector(upv,offY);
    const tf=-Math.cos(cross*Math.PI)*0.5+0.12;
    ptgt.copy(planeMesh.position).addScaledVector(rgt,-1.0+m.x*0.15).addScaledVector(upv,-0.55+m.y*0.15).addScaledVector(fwd,tf);
    planeMesh.up.copy(upv); planeMesh.lookAt(ptgt); planeMesh.rotateZ(-0.3 - m.x*1.0); planeMesh.rotateX(0.25 + m.y*0.5);
    planeMesh.scale.setScalar(1.7*Math.min(1,skyVis+0.4)); planeMesh.material.opacity=skyVis;
  } else planeMesh.visible=false;

  /* sea + splash */
  seaMat.uniforms.uTime.value=t; seaMat.uniforms.uOpacity.value=smoothstep(0.70,0.82,p)*(1-smoothstep(0.97,0.995,p));
  if(p>0.93 && !splash.fired) fire();
  if(p<0.84) splash.fired=false;
  if(splash.active){ splash.t+=dt; if(splash.t>4) splash.active=false; }
  seaMat.uniforms.uSplash.value.set(0,0,splash.t, splash.active?5.0:0.0);
  for(let i=ripples.length-1;i>=0;i--){ ripples[i].age+=dt; if(ripples[i].age>3.5) ripples.splice(i,1); }
  for(let i=0;i<MAXR;i++){ const r=ripples[i]; if(r) ripVec[i].set(r.x,r.z,r.age,r.s); else ripVec[i].set(0,0,99,0); }
  seaMat.uniforms.uRippleCount.value=ripples.length;

  /* 심해 — data dust */
  const deepVis=smoothstep(0.93,0.985,p);
  if(deepVis>0.005){
    ray.setFromCamera(mt, camera);
    cwd.copy(ray.ray.origin).addScaledVector(ray.ray.direction, camera.position.distanceTo(DC));
    pulseT+=dt;
    for(let i=0;i<DUST;i++){ const i3=i*3;
      const dx=dPos[i3]-cwd.x, dy=dPos[i3+1]-cwd.y, dz=dPos[i3+2]-cwd.z, d2=dx*dx+dy*dy+dz*dz;
      if(d2<900){ const dd=Math.sqrt(d2)+0.01, f=(1-dd/30)*36*dt; dVel[i3]+=(dx/dd-dz/dd*0.6)*f; dVel[i3+1]+=dy/dd*f; dVel[i3+2]+=(dz/dd+dx/dd*0.6)*f; }
      if(pulseT<1.3){ const px=dPos[i3]-pulseC.x,py=dPos[i3+1]-pulseC.y,pz=dPos[i3+2]-pulseC.z, pd2=px*px+py*py+pz*pz; if(pd2<5000){ const pd=Math.sqrt(pd2)+0.01, pf=(1-pd/71)*150*dt*(1-pulseT/1.3); dVel[i3]+=px/pd*pf; dVel[i3+1]+=py/pd*pf; dVel[i3+2]+=pz/pd*pf; } }
      dVel[i3]*=0.9; dVel[i3+1]*=0.9; dVel[i3+2]*=0.9;
      dPos[i3]+=dVel[i3]*dt; dPos[i3+1]+=dVel[i3+1]*dt+0.5*dt; dPos[i3+2]+=dVel[i3+2]*dt;
      if(dPos[i3+1]>DC.y+95) dPos[i3+1]=DC.y-95;
      dA[i]=deepVis*(0.45+0.4*Math.abs(Math.sin(t*0.6+i)));
    }
    dustGeo.attributes.position.needsUpdate=true; dustGeo.attributes.aA.needsUpdate=true;
  } else if(dA[0]!==0){ for(let i=0;i<DUST;i++) dA[i]=0; dustGeo.attributes.aA.needsUpdate=true; }

  updateHelix();
  totop.classList.toggle('show', window.scrollY > maxScroll()-innerHeight*0.5);
  renderer.render(scene, camera);
  requestAnimationFrame(frame);
}
frame();
addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); measure(); });
</script>
</body>
