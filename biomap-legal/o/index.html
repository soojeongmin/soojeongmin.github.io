<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>생동감 — 관찰 열기</title>
<style>
  :root { --brand:#19CE98; --brand2:#00A877; --bg:#F1F2F4; --ink:#121213; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
         background:var(--bg); color:var(--ink); min-height:100vh;
         display:flex; align-items:center; justify-content:center; padding:24px; }
  .card { width:100%; max-width:400px; background:#fff; border-radius:24px;
          padding:32px 24px; text-align:center; box-shadow:0 10px 40px rgba(0,0,0,.08); }
  .logo { width:72px; height:72px; border-radius:18px;
          background:linear-gradient(135deg,var(--brand),var(--brand2));
          display:flex; align-items:center; justify-content:center; margin:0 auto 16px;
          font-size:38px; }
  h1 { font-size:22px; margin-bottom:6px; }
  p { color:#6b6f76; font-size:15px; margin-bottom:24px; line-height:1.5; }
  .btn { display:block; width:100%; padding:15px; border-radius:14px; font-size:16px;
         font-weight:700; text-decoration:none; margin-bottom:10px; border:none; cursor:pointer; }
  .primary { background:linear-gradient(90deg,var(--brand),var(--brand2)); color:#fff; }
  .store { background:#fff; color:var(--ink); border:1px solid #e3e5e9; }
  .foot { font-size:12px; color:#9aa0a6; margin-top:14px; }
</style>
</head>
<body>
  <div class="card">
    <div class="logo">🌱</div>
    <h1>생동감</h1>
    <p id="desc">앱에서 이 관찰을 확인해보세요.<br>앱이 없다면 설치 후 다시 열어주세요.</p>
    <a class="btn primary" id="openApp" href="#">앱에서 열기</a>
    <a class="btn store" id="appstore" href="https://apps.apple.com/kr/app/id6775654322">App Store에서 받기</a>
    <a class="btn store" id="playstore" href="https://play.google.com/store/apps/details?id=com.soojeongmin.biomap">Google Play에서 받기</a>
    <div class="foot">생생한 동식물 도감 · 생동감</div>
  </div>
<script>
  var params = new URLSearchParams(location.search);
  var id = (params.get('id') || '').replace(/[^A-Za-z0-9_-]/g, '');
  var scheme = 'biomap://o/' + id;
  var openApp = document.getElementById('openApp');
  openApp.href = scheme;

  var ua = navigator.userAgent || '';
  var isIOS = /iPhone|iPad|iPod/i.test(ua);
  var isAndroid = /Android/i.test(ua);
  var appstore = document.getElementById('appstore');
  var playstore = document.getElementById('playstore');
  if (isIOS) { playstore.style.display = 'none'; }
  else if (isAndroid) { appstore.style.display = 'none'; }

  if (id) {
    openApp.addEventListener('click', function () {
      window.location = scheme;
    });
  } else {
    openApp.style.display = 'none';
    document.getElementById('desc').innerHTML = '생동감을 설치하고 동식물 도감을 만들어보세요.';
  }
</script>
</body>
</html>
